services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: llm-qdrant
    restart: unless-stopped
    env_file: .env
    ports:
      - "${QDRANT_PORT_HTTP}:6333"
      - "${QDRANT_PORT_GRPC}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=${QDRANT_PORT_HTTP}
      - QDRANT__SERVICE__GRPC_PORT=${QDRANT_PORT_GRPC}

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llm-llama-cpp
    restart: unless-stopped
    ports:
      - "${LLM_PORT}:${LLM_PORT}"
    volumes:
      - ./llm_app/models:/models
      - llama-cache:/root/.cache
    command:
      - -m
      - /models/${LLAMA_MODEL_FILE:-model.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "${LLM_PORT}"
      - -c
      - "${LLAMA_CTX_SIZE:-4096}"
      - -ngl
      - "${LLAMA_N_GPU_LAYERS:-0}"
      - --parallel
      - "${LLAMA_PARALLEL:-1}"
      - --alias
      - ${LLAMA_MODEL_ALIAS:-local-gguf}

  web:
    container_name: llm-web
    build:
      context: ./app
      dockerfile: Dockerfile.web
    ports:
      - "8008:8008"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - DB_NAME=${DB_NAME}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_PORT=${DB_PORT}
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT_HTTP=${QDRANT_PORT_HTTP}
      - QDRANT_PORT_GRPC=${QDRANT_PORT_GRPC}
      - VECT_QD_PORT=${VECT_QD_PORT}
      - LLM_PORT=${LLM_PORT}
      - API_PORT=${API_PORT}
      - LLAMA_BASE_URL=http://llama-cpp:${LLM_PORT}
      - LLAMA_MODEL_ALIAS=${LLAMA_MODEL_ALIAS:-local-gguf}
      - LLAMA_GENERATION_TEMPERATURE=${LLAMA_GENERATION_TEMPERATURE:-0.2}
      - LLAMA_GENERATION_MAX_TOKENS=${LLAMA_GENERATION_MAX_TOKENS:-1024}
      - LLAMA_REQUEST_TIMEOUT=${LLAMA_REQUEST_TIMEOUT:-600}
    depends_on:
      - qdrant
      - llama-cpp

  vectoriser:
    container_name: llm-qd-vectoriser
    build:
      context: ./qdrant_app
      dockerfile: Dockerfile.vect
    ports:
      - "${VECT_QD_PORT}:${VECT_QD_PORT}"
    environment:
      - PYTHONPATH=/qdrant_app
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT_HTTP=${QDRANT_PORT_HTTP}
      - QDRANT_PORT_GRPC=${QDRANT_PORT_GRPC}
      - VECT_MODEL=${VECT_MODEL}
    depends_on:
      - web

volumes:
  db-data:
  qdrant-data:
  llama-cache:
